name: CI

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type-check · Lint · Audit · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Security audit
      run: npm audit --audit-level=high

    - name: Generate Prisma client
      run: npx prisma generate

    - name: Type check
      run: npm run type-check

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build
      env:
        # Fake values — build verifies compilation only, no DB connection in CI
        DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        NEXTAUTH_SECRET: ci-placeholder-secret-not-used-in-production
        NEXTAUTH_URL: http://localhost:3000
        AUTH_MODE: none
