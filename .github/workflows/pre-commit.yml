name: Pre-commit checks

on:
    push:
        branches: [main, 'feat/**']
    pull_request:
        branches: [main]

jobs:
    pre-commit:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: '3.11'

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run pre-commit checks
              uses: pre-commit/action@v3.0.0
              env:
                  SKIP: no-commit-to-branch

    eslint:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint

    type-check:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npm run type-check

    build:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
