name: Bug report
description: Something isn't working correctly
labels: [ bug ]
body:
- type: markdown
  attributes:
    value: Thanks for taking the time to report a bug!

- type: textarea
  id: description
  attributes:
    label: What happened?
    description: A clear description of the bug.
    placeholder: When I click X, Y happens instead of Z.
  validations:
    required: true

- type: textarea
  id: steps
  attributes:
    label: Steps to reproduce
    value: |
      1. Go to ...
      2. Click ...
      3. See error
  validations:
    required: true

- type: textarea
  id: expected
  attributes:
    label: Expected behaviour
  validations:
    required: true

- type: dropdown
  id: auth_mode
  attributes:
    label: Deployment mode
    options:
    - Local Docker (AUTH_MODE=none)
    - Self-hosted (AUTH_MODE=email_otp)
  validations:
    required: true

- type: textarea
  id: context
  attributes:
    label: Additional context
    description: Browser, OS, screenshots, error messages from the console.
