services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: reeesume
      POSTGRES_PASSWORD: reeesume
      POSTGRES_DB: reeesume
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U reeesume']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://reeesume:reeesume@db:5432/reeesume
      AUTH_MODE: none
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?must-be-set-generate-with-openssl-rand-base64-32}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "node_modules/.bin/prisma migrate deploy && node server.js"

volumes:
  postgres_data:
